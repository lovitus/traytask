name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Linux deps for systray
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev

      - name: Build binary (unix)
        if: matrix.goos != 'windows'
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          OUT="traytask-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "dist/${OUT}" .
          tar -C dist -czf "dist/${OUT}.tar.gz" "${OUT}"

      - name: Build binary (windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $gui = "traytask-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          $cli = "traytask-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w -H=windowsgui -X main.version=$env:GITHUB_REF_NAME" -o "dist/$gui" .
          go build -trimpath -ldflags "-s -w -X main.version=$env:GITHUB_REF_NAME" -o "dist/$cli" .
          Compress-Archive -Path "dist/$gui","dist/$cli" -DestinationPath "dist/traytask-${{ matrix.goos }}-${{ matrix.goarch }}.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: traytask-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
